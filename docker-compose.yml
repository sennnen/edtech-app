version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: edtech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: edtech
      POSTGRES_PASSWORD: edtech_secret
      POSTGRES_DB: edtech_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
